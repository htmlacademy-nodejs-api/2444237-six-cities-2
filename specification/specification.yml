openapi: 3.0.0
info:
  title: "Six cities API"
  version: "1.0.0"
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers: 
  - url: http://localhost:3000 
tags:
  - name: Users
    description: Пользователи
  - name: Offers
    description: Предложения
  - name: Comments
    description: Комментарии

paths:
  /users/register:
    post:
      summary: Создать пользователя
      operationId: createUser
      security: []
      tags: [Users]
      requestBody:
        content:
          application/json:
            schema:
             $ref: '#/components/schemas/User'
        required: true
      responses:
        '201':
          description: Пользователь успешно создан
          $ref: '#/components/responses/UserResponse'

        '409':
          description: Пользователь с таким email уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComflictError'

        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

        '500':
          description: Произошла ошибка на сервере
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

  /users/login:
    post:
      summary: Авторизация пользователя
      operationId: loginUser
      security: []
      tags: [Users]
      requestBody:
        content:
          application/json:
            schema:
             $ref: '#/components/schemas/LoginUser'
        required: true
      responses:
        '200':
          description: Пользователь успешно авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoggedUser'

        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

        '500':
          description: Произошла ошибка на сервере
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

    get:
      summary: Получить информацию о текущем пользователе
      operationId: getCurrentUser
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Пользователь успешно авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Пользователь не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '500':
          description: Произошла ошибка на сервере
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

  /users/{userId}/favorite:
    get:
      summary: Получить список избранных предложений
      operationId: getUserFavoriteOffers
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            example: '5f9b2e6c7b7b7b7b7b7b7b7b'
      tags: [Users]
      security:  
          - bearerAuth: []
      responses:
        '200':
          description: Предложения успешно получены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFavoriteOffers'
        '401':
          description: Пользователь не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '403':
          description: Пользователь не является владельцем списка избранного
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '500':
          description: Произошла ошибка на сервере
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

  /users/{userId}/avatar:
     post:
       summary: Загрузка аватара
       operationId: uploadAvatar
       security: 
        -  bearerAuth: []
       parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            example: '5f9b2e6c7b7b7b7b7b7b7b7b'
       tags: [Users]
       requestBody:
         content:
           multipart/form-data:
             schema:
               type: string
               properties:
                 file:
                  type: string
       responses:
         '201':
           description: Аватар успешно загружен
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/UserResponse'
         '401':
           description: Пользователь не авторизован
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/UnauthorizedError'
         '500':
           description: Произошла ошибка на сервере
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ServerError'
         '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /offers:
    get:
      summary: Получить список предложений
      operationId: getOffers
      security: []
      tags: [Offers]
      responses:
        '200':
          description: Предложения успешно получены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Offers'
        '500':
          description: Произошла ошибка на сервере
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
    post:
      summary: Добавление нового предложения
      operationId: createOffer
      security: 
        -  bearerAuth: []
      tags: [Offers]
      requestBody:
        content:
          application/json:
            schema:
             $ref: '#/components/schemas/CreateOffer'
      responses:
        '201':
          description: Предложение успешно создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferRdo'
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Произошла ошибка на сервере
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

  /offers/{offerId}:
    get:
      summary: Получение предложения
      operationId: getOffer
      security: []
      tags: [Offers]
      parameters:
        - in: path
          name: offerId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Предложение успешно получено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferRdo'
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '404':
          description: Предложение не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '500':
          description: Произошла ошибка на сервере
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
    put:
      summary: Редактирование предложения
      operationId: updateOffer
      tags: [Offers]
      security: 
        -  bearerAuth: []
      parameters:
        - in: path
          name: offerId
          required: true
          schema:
            type: string
            example: '5f9b2e6c7b7b7b7b7b7b7b7b'
      requestBody:
        content:
          application/json:
            schema:
             $ref: '#/components/schemas/UpdateOffer'
      responses:
         '200':
          description: Предложение успешно обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferRdo'
         '403':
          description: Пользователь не является владельцем предложения
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

         '404':
          description: Предложение не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

         '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

         '500':
          description: Произошла ошибка на сервере
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
    delete:
      summary: Удаление предложения
      operationId: deleteOffer
      security: 
        -  bearerAuth: []
      tags: [Offers]
      parameters:
        - in: path
          name: offerId
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Предложение успешно удалено
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidIdError'
        '403':
          description: Пользователь не является владельцем предложения
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Предложение не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '500':
          description: Произошла ошибка на сервере
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

  /offers/{offerId}/favorite:
    post:
      summary: Добавление предложения в избранное
      operationId: addFavorite
      security: 
        -  bearerAuth: []
      parameters:
        - in: path
          name: offerId
          required: true
          schema:
            type: string
      tags: [Offers]
      responses:
        '200':
          description: Предложение успешно добавлено в избранное
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '404':
          description: Предложение не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '401':
          description: Пользователь не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '500':
          description: Произошла ошибка на сервере
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
    delete:
      summary: Удаление предложения из избранного
      operationId: deleteFavorite
      security: 
        -  bearerAuth: []
      parameters:
        - in: path
          name: offerId
          required: true
          schema:
            type: string
      tags: [Offers]
      responses:
        '200':
          description: Предложение успешно удалено из избранного
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '404':
          description: Предложение не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '401':
          description: Пользователь не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '500':
          description: Произошла ошибка на сервере
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'  

  /offers/premium/{city}:
    get:
      summary: Получить список премиум предложений
      operationId: getPremiumOffers
      security: []
      tags: [Offers]
      parameters:
        - in: path
          name: city
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Предложения успешно получены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Offers'
        '500':
          description: Произошла ошибка на сервере
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
  /offers/{offerId}/comments:
    get:
      summary: Получить список комментариев
      operationId: getComments
      security: []
      tags: [Comments]
      parameters:
        - in: path
          name: offerId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Комментарии успешно получены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comments'
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Произошла ошибка на сервере
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
    post:
      summary: Добавление нового комментария
      operationId: createComment
      parameters: 
        - in: path
          name: offerId
          required: true
          schema:
            type: string
      security: 
        -  bearerAuth: []
      tags: [Comments]
      requestBody:
        content:
          application/json:
            schema:
             $ref: '#/components/schemas/CreateComment'
        required: true
      responses:
        '201':
          description: Комментарий успешно добавлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentRdo'
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Произошла ошибка на сервере
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: 'invalid id'
  
    ServerError:
      type: object
      required: [error]
      properties: 
        error:
          type: string
          example: 'Server error'
    
    NotFoundError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: 'Not found'

    UnauthorizedError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: 'Unauthorized'
    ForbiddenError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: 'Access denied'

    InvalidIdError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: 'invalid id'
    ComflictError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: 'User already exists'
        
    ValidationErrorItem:
      type: object
      properties:
        property:
          type: string
          example: 'email'
        value:
          description: Некорректное значение поля
        constraints:
          type: object
          additionalProperties:
            type: string
          example:
            isEmail: 'email must be an email'
        children:
          type: array
          items:
            $ref: '#/components/schemas/ValidationErrorItem'
    ValidationErrorResponse:
      type: array
      items:
        $ref: '#/components/schemas/ValidationErrorItem'
    
    AuthErrorResponse:
      type: object
      required: [type, error]
      properties:
        type:
          type: string
          enum: [AUTHORIZATION]
          example: 'AUTHORIZATION'
        error:
          type: string
          example: 'User password incorrect'

    LoginUser:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: 'john.doe@example.com'
        password:
          type: string
          example: 'qwerty123'
          minLength: 6
          maxLength: 12

    LoggedUser:
      type: object
      properties:
        email:
          type: string
          format: email
          example: 'john.doe@example.com'
        token:
          type: string
          example: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'

    User:
      type: object
      required: [name, email, password, isPro]
      properties:
        name:
          type: string
          example: 'John Doe'
          minLength: 1
          maxLength: 15
        email:
          type: string
          format: email
          example: 'john.doe@example.com'
        avatar:
          type: string
          example: 'https://example.com/avatar.jpg'
        password:
          type: string
          example: 'qwerty123'
          minLength: 6
          maxLength: 12
        isPro:
          type: boolean
          example: false

    UserResponse:
      type: object
      properties:
        name:
          type: string
          example: 'John Doe'
        email:
          type: string
          format: email
          example: 'john.doe@example.com'
        avatar:
          type: string
          example: 'https://example.com/avatar.jpg'
        isPro:
          type: boolean
          example: false
        favorites:
          type: array
          items:
            type: string
            example: '6dcfd4433f8d3f6d4f3d4f3d4f3d4f3d'

    Location:
      type: object
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
          example: 48.8566
        longitude:
          type: number
          example: 2.3522

    CreateOffer:
      type: object
      required:
        - title
        - description
        - date
        - city
        - imagePreview
        - images
        - isPremium
        - isFavorite
        - rating
        - type
        - bedrooms
        - maxAdults
        - price
        - goods
        - commentsCount
        - location
      properties:
        title:
          type: string
          minLength: 10
          maxLength: 100
          example: 'Apartment in the center of the city'
        description:
          type: string
          minLength: 20
          maxLength: 1024
          example: 'Apartment in the center of the city with a great view'
        date:
          type: string
          format: date
          example: '2026-01-20'
        city:
          type: string
          enum: [Paris, Cologne, Brussels, Amsterdam, Hamburg, Dusseldorf]
          example: 'Paris'
        imagePreview:
          type: string
          example: 'https://example.com/preview.jpg'
        images:
          type: array
          items:
            type: string
            example: 'https://example.com/image.jpg'
        isPremium:
          type: boolean
          example: true
        isFavorite:
          type: boolean
          example: false
        rating:
          type: number
          minimum: 1
          maximum: 5
          example: 4.5
        type:
          type: string
          enum: [apartment, house, room, hotel]
          example: 'apartment'
        bedrooms:
          type: integer
          minimum: 1
          maximum: 8
          example: 2
        maxAdults:
          type: integer
          minimum: 1
          maximum: 10
          example: 4
        price:
          type: integer
          minimum: 100
          maximum: 100000
          example: 5000
        goods:
          type: array
          items:
            type: string
            enum:
              - Breakfast
              - Air conditioning
              - Laptop friendly workspace
              - Baby seat
              - Washer
              - Towels
              - Fridge
          example: ['Breakfast', 'Air conditioning']
        commentsCount:
          type: integer
          example: 0
        location:
          $ref: '#/components/schemas/Location'

    UpdateOffer:
      type: object
      properties:
        title:
          type: string
          minLength: 10
          maxLength: 100
          example: 'Apartment in the center of the city'
        description:
          type: string
          minLength: 20
          maxLength: 1024
          example: 'Apartment in the center of the city with a great view'
        date:
          type: string
          format: date
          example: '2026-01-20'
        city:
          type: string
          enum: [Paris, Cologne, Brussels, Amsterdam, Hamburg, Dusseldorf]
          example: 'Paris'
        imagePreview:
          type: string
          example: 'https://example.com/preview.jpg'
        images:
          type: array
          items:
            type: string
            example: 'https://example.com/image.jpg'
        isPremium:
          type: boolean
          example: true
        isFavorite:
          type: boolean
          example: false
        rating:
          type: number
          minimum: 1
          maximum: 5
          example: 4.5
        type:
          type: string
          enum: [apartment, house, room, hotel]
          example: 'apartment'
        bedrooms:
          type: integer
          minimum: 1
          maximum: 8
          example: 2
        maxAdults:
          type: integer
          minimum: 1
          maximum: 10
          example: 4
        price:
          type: integer
          minimum: 100
          maximum: 100000
          example: 5000
        goods:
          type: array
          items:
            type: string
            enum:
              - Breakfast
              - Air conditioning
              - Laptop friendly workspace
              - Baby seat
              - Washer
              - Towels
              - Fridge
          example: ['Breakfast', 'Air conditioning']
        commentsCount:
          type: integer
          example: 0
        location:
          $ref: '#/components/schemas/Location'

    OfferRdo:
      type: object
      properties:
        _id:
          type: string
          example: '6dcfd4433f8d3f6d4f3d4f3d4f3d4f3d'
        title:
          type: string
          example: 'Apartment in the center of the city'
        description:
          type: string
          example: 'Apartment in the center of the city with a great view'
        date:
          type: string
          format: date-time
          example: '2026-01-20T00:00:00.000Z'
        city:
          type: string
          enum: [Paris, Cologne, Brussels, Amsterdam, Hamburg, Dusseldorf]
          example: 'Paris'
        imagePreview:
          type: string
          example: 'https://example.com/preview.jpg'
        images:
          type: array
          minLength: 6
          items:
            type: string
            example: ['https://example.com/image1.jpg', 'https://example.com/image2.jpg', 'https://example.com/image3.jpg', 'https://example.com/image4.jpg', 'https://example.com/image5.jpg', 'https://example.com/image6.jpg']
        isPremium:
          type: boolean
          example: true
        isFavorite:
          type: boolean
          example: false
        rating:
          type: number
          minimum: 1
          maximum: 5
          example: 4.5
        type:
          type: string
          enum: [apartment, house, room, hotel]
          example: 'apartment'
        bedrooms:
          type: integer
          example: 2
        maxAdults:
          type: integer
          example: 4
        price:
          type: integer
          example: 5000
        goods:
          type: array
          items:
            type: string
            enum: [Breakfast, Air conditioning, Laptop friendly workspace, Baby seat, Washer, Towels, Fridge]
          example: ['Breakfast', 'Air conditioning']
        host:
          type: string
          example: '6dcfd4433f8d3f6d4f3d4f3d4f3d4f3d'
        commentsCount:
          type: integer
          example: 12
        location:
          $ref: '#/components/schemas/Location'
          example: {
            lat: 50.4501,
            lng: 30.5234
          }

    Offers:
      type: array
      items:
        $ref: '#/components/schemas/OfferRdo'

    CreateComment:
      type: object
      required: [text, rating, date]
      properties:
        text:
          type: string
          minLength: 5
          maxLength: 1024
          example: 'Comment text'
        rating:
          type: number
          minimum: 1
          maximum: 5  
          example: 5
        date:
