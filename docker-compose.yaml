version: '3.9'

services:
  db:
    image: mongo:4.2
    restart: always
    container_name: six-cities-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD:-test}
    ports:
      - "${DB_PORT:-27017}:27017"
    volumes:
      - six-cities_data:/data/db
    networks:
      - app-network

  db_ui:
    image: mongo-express
    restart: always
    container_name: six-cities-mongo-express
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_PASSWORD:-test}
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${DB_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${DB_PASSWORD:-test}
      ME_CONFIG_MONGODB_URL: mongodb://${DB_USER:-admin}:${DB_PASSWORD:-test}@db:27017/
    depends_on:
      - db
    networks:
      - app-network

volumes:
  six-cities_data:
